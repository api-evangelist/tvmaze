    port: 9090
    transport: http
    description: "MCP adapter for TVmaze Public API \u2014 People. One tool per consumed operation, routed inline through\
      \ this capability's consumes block."
    tools:
    - name: list-people
      description: List People
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: public-people.listPeople
      with:
        page: tools.page
      outputParameters:
      - type: object
        mapping: $.
    - name: get-person
