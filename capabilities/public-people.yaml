  - type: http
    namespace: public-people
    baseUri: https://api.tvmaze.com
    description: "TVmaze Public API \u2014 People business capability. Self-contained, no shared references."
    resources:
    - name: people
      path: /people
      operations:
      - name: listPeople
        method: GET
        description: List People
        inputParameters:
        - name: page
          in: query
          type: integer
          required: false
          description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: people-id
      path: /people/{id}
      operations:
      - name: getPerson
        method: GET
        description: Get Person
        inputParameters:
        - name: id
          in: path
          type: integer
          required: true
          description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: people-id-castcredits
      path: /people/{id}/castcredits
      operations:
      - name: getPersonCastCredits
        method: GET
        description: Get Person Cast Credits
        inputParameters:
        - name: id
          in: path
          type: integer
          required: true
          description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: people-id-crewcredits
