naftiko: 1.0.0-alpha2
info:
  label: "TVmaze Public API \u2014 Schedule"
  description: "TVmaze Public API \u2014 Schedule. 3 operations. Lead operation: Get Schedule. Self-contained Naftiko capability\
    \ covering one TVmaze business surface."
  tags:
  - TVmaze
  - Public API
  - Schedule
  created: '2026-05-30'
  modified: '2026-05-30'
binds: []
capability:
  consumes:
  - type: http
    namespace: public-schedule
    baseUri: https://api.tvmaze.com
    description: "TVmaze Public API \u2014 Schedule business capability. Self-contained, no shared references."
    resources:
    - name: schedule
      path: /schedule
      operations:
      - name: getSchedule
        method: GET
        description: Get Schedule
        inputParameters:
        - name: country
          in: query
          type: string
          required: false
          description: ISO 3166-1 alpha-2 country code (default US).
        - name: date
          in: query
          type: string
          required: false
          description: ISO 8601 date (default today).
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: schedule-web
      path: /schedule/web
      operations:
      - name: getWebSchedule
        method: GET
        description: Get Web Schedule
        inputParameters:
        - name: country
          in: query
          type: string
          required: false
          description: ''
        - name: date
          in: query
          type: string
          required: false
          description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: schedule-full
      path: /schedule/full
      operations:
      - name: getFullSchedule
        method: GET
        description: Get Full Schedule
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: public-schedule-rest
    port: 8080
    description: "REST adapter for TVmaze Public API \u2014 Schedule. One Spectral-compliant resource per consumed operation,\
      \ prefixed with /v1."
    resources:
    - path: /v1/schedule
      name: schedule
      description: REST surface for /schedule.
      operations:
      - method: GET
        name: getSchedule
        description: Get Schedule
        call: public-schedule.getSchedule
        with:
          country: rest.country
          date: rest.date
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/schedule/web
      name: schedule-web
      description: REST surface for /schedule/web.
      operations:
      - method: GET
        name: getWebSchedule
        description: Get Web Schedule
        call: public-schedule.getWebSchedule
        with:
          country: rest.country
          date: rest.date
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/schedule/full
      name: schedule-full
      description: REST surface for /schedule/full.
      operations:
      - method: GET
        name: getFullSchedule
        description: Get Full Schedule
        call: public-schedule.getFullSchedule
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: public-schedule-mcp
    port: 9090
    transport: http
    description: "MCP adapter for TVmaze Public API \u2014 Schedule. One tool per consumed operation, routed inline through\
      \ this capability's consumes block."
    tools:
    - name: get-schedule
      description: Get Schedule
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: public-schedule.getSchedule
      with:
        country: tools.country
        date: tools.date
      outputParameters:
      - type: object
        mapping: $.
    - name: get-web-schedule
      description: Get Web Schedule
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: public-schedule.getWebSchedule
      with:
        country: tools.country
        date: tools.date
      outputParameters:
      - type: object
        mapping: $.
    - name: get-full-schedule
      description: Get Full Schedule
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: public-schedule.getFullSchedule
      outputParameters:
      - type: object
        mapping: $.
