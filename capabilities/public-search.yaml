naftiko: 1.0.0-alpha2
info:
  label: "TVmaze Public API \u2014 Search"
  description: "TVmaze Public API \u2014 Search. 4 operations. Lead operation: Search Shows. Self-contained Naftiko capability\
    \ covering one TVmaze business surface."
  tags:
  - TVmaze
  - Public API
  - Search
  created: '2026-05-30'
  modified: '2026-05-30'
binds: []
capability:
  consumes:
  - type: http
    namespace: public-search
    baseUri: https://api.tvmaze.com
    description: "TVmaze Public API \u2014 Search business capability. Self-contained, no shared references."
    resources:
    - name: search-shows
      path: /search/shows
      operations:
      - name: searchShows
        method: GET
        description: Search Shows
        inputParameters:
        - name: q
          in: query
          type: string
          required: true
          description: Search query string.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: singlesearch-shows
      path: /singlesearch/shows
      operations:
      - name: singleSearchShows
        method: GET
        description: Single Search Shows
        inputParameters:
        - name: q
          in: query
          type: string
          required: true
          description: ''
        - name: embed
          in: query
          type: string
          required: false
          description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: lookup-shows
      path: /lookup/shows
      operations:
      - name: lookupShows
        method: GET
        description: Lookup Shows By External ID
        inputParameters:
        - name: tvrage
          in: query
          type: integer
          required: false
          description: ''
        - name: thetvdb
          in: query
          type: integer
          required: false
          description: ''
        - name: imdb
          in: query
          type: string
          required: false
          description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: search-people
      path: /search/people
      operations:
      - name: searchPeople
        method: GET
        description: Search People
        inputParameters:
        - name: q
          in: query
          type: string
          required: true
          description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: public-search-rest
    port: 8080
    description: "REST adapter for TVmaze Public API \u2014 Search. One Spectral-compliant resource per consumed operation,\
      \ prefixed with /v1."
    resources:
    - path: /v1/search/shows
      name: search-shows
      description: REST surface for /search/shows.
      operations:
      - method: GET
        name: searchShows
        description: Search Shows
        call: public-search.searchShows
        with:
          q: rest.q
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/singlesearch/shows
      name: singlesearch-shows
      description: REST surface for /singlesearch/shows.
      operations:
      - method: GET
        name: singleSearchShows
        description: Single Search Shows
        call: public-search.singleSearchShows
        with:
          q: rest.q
          embed: rest.embed
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/lookup/shows
      name: lookup-shows
      description: REST surface for /lookup/shows.
      operations:
      - method: GET
        name: lookupShows
        description: Lookup Shows By External ID
        call: public-search.lookupShows
        with:
          tvrage: rest.tvrage
          thetvdb: rest.thetvdb
          imdb: rest.imdb
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/search/people
      name: search-people
      description: REST surface for /search/people.
      operations:
      - method: GET
        name: searchPeople
        description: Search People
        call: public-search.searchPeople
        with:
          q: rest.q
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: public-search-mcp
    port: 9090
    transport: http
    description: "MCP adapter for TVmaze Public API \u2014 Search. One tool per consumed operation, routed inline through\
      \ this capability's consumes block."
    tools:
    - name: search-shows
      description: Search Shows
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: public-search.searchShows
      with:
        q: tools.q
      outputParameters:
      - type: object
        mapping: $.
    - name: single-search-shows
      description: Single Search Shows
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: public-search.singleSearchShows
      with:
        q: tools.q
        embed: tools.embed
      outputParameters:
      - type: object
        mapping: $.
    - name: lookup-shows-external-id
      description: Lookup Shows By External ID
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: public-search.lookupShows
      with:
        tvrage: tools.tvrage
        thetvdb: tools.thetvdb
        imdb: tools.imdb
      outputParameters:
      - type: object
        mapping: $.
    - name: search-people
      description: Search People
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: public-search.searchPeople
      with:
        q: tools.q
      outputParameters:
      - type: object
        mapping: $.
