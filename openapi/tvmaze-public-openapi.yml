        required: true
        schema: {type: string}
        description: Search query string.
      responses:
        '200':
          description: List of show search hits scored by match.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    score: {type: number}
                    show: {$ref: '#/components/schemas/Show'}
              examples:
                default:
                  summary: Example response for /search/shows
                  value:
