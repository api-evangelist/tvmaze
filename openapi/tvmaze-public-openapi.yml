openapi: 3.0.3
info:
  title: TVmaze Public API
  description: |
    The TVmaze API is a free RESTful API that returns rich television show, episode, season,
    cast, crew, and schedule data. The public endpoints require no authentication and are
    licensed under CC BY-SA — attribution to tvmaze.com is required. A paid Premium tier
    unlocks a separate user-scoped API documented as `tvmaze-premium-openapi.yml`.

    Rate limit: at least 20 calls every 10 seconds per IP. HTTP 429 indicates the limit
    was exceeded.
  version: '1.0'
  contact:
    name: TVmaze
    url: https://www.tvmaze.com/api
  license:
    name: CC BY-SA 4.0
    url: https://creativecommons.org/licenses/by-sa/4.0/
servers:
- url: https://api.tvmaze.com
  description: Production API (HTTPS)
- url: http://api.tvmaze.com
  description: Production API (HTTP)
tags:
- name: Search
  description: Free-text search and lookup endpoints for shows and people.
- name: Schedule
  description: Daily and rolling TV and web/streaming schedules.
- name: Shows
  description: Show metadata, episodes, seasons, cast, crew, images, and aliases.
- name: Episodes
  description: Individual episode details including guest cast and crew.
- name: Seasons
  description: Season-level metadata and episode listings.
- name: People
  description: Person profiles, cast credits, and crew credits.
- name: Updates
  description: Bulk timestamps useful for incremental sync of shows and people.
paths:
  /search/shows:
