  /singlesearch/shows:
    get:
      tags: [Search]
      operationId: singleSearchShows
      summary: Single Search Shows
      description: Return the single best matching show for a query, optionally embedding related data.
      parameters:
      - name: q
        in: query
        required: true
        schema: {type: string}
      - name: embed
        in: query
        required: false
        schema: {type: string, enum: [episodes, cast]}
      responses:
        '200':
          description: A single show record.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Show'}
        '404': {description: Not Found}
  /lookup/shows:
    get:
      tags: [Search]
      operationId: lookupShows
      summary: Lookup Shows By External ID
      description: Look up a show using a TVRage, TheTVDB, or IMDb identifier.
      parameters:
      - name: tvrage
        in: query
        required: false
        schema: {type: integer}
      - name: thetvdb
        in: query
        required: false
        schema: {type: integer}
      - name: imdb
        in: query
        required: false
        schema: {type: string}
      responses:
        '200':
          description: Matching show.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Show'}
        '404': {description: Not Found}
  /search/people:
    get:
      tags: [Search]
      operationId: searchPeople
      summary: Search People
      description: Search for people (actors, crew) using a fuzzy text query.
      parameters:
      - name: q
        in: query
        required: true
        schema: {type: string}
      responses:
        '200':
          description: List of person search hits.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    score: {type: number}
                    person: {$ref: '#/components/schemas/Person'}
